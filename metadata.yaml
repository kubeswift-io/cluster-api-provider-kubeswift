# clusterctl provider metadata: maps this provider's release series to the
# Cluster API contract it implements. clusterctl reads this to decide
# compatibility with the installed Cluster API version.
#
# Grounded 2026-07-17 against Cluster API v1.13.4: this provider targets the
# v1beta2 infrastructure-provider contract (types under api/core/v1beta2).
# The v1beta1 contract is deprecated (compatibility removed tentatively April 2027).
apiVersion: clusterctl.cluster.x-k8s.io/v1alpha3
kind: Metadata
releaseSeries:
  - major: 0
    minor: 1
    contract: v1beta2
