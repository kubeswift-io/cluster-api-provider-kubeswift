apiVersion: v1
kind: Service
metadata:
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: cluster-api-provider-kubeswift
    app.kubernetes.io/managed-by: kustomize
  # Short name: with the "cluster-api-provider-kubeswift-" namePrefix, the full
  # Service name must stay within the 63-character limit.
  name: metrics-service
  namespace: system
spec:
  ports:
  - name: https
    port: 8443
    protocol: TCP
    targetPort: 8443
  selector:
    control-plane: controller-manager
    app.kubernetes.io/name: cluster-api-provider-kubeswift
