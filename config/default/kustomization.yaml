# Adds namespace to all resources.
namespace: cluster-api-provider-kubeswift-system

# Value of this field is prepended to the names of all resources.
namePrefix: cluster-api-provider-kubeswift-

resources:
- ../crd
- ../rbac
- ../manager
# [WEBHOOK] The validating webhook (KubeSwiftMachineTemplate immutability).
- ../webhook
# [CERTMANAGER] cert-manager issues the webhook serving cert (secret webhook-server-cert).
- ../certmanager
# [METRICS] Expose the controller manager metrics service.
- metrics_service.yaml

patches:
# [METRICS] Enable the metrics endpoint (HTTPS on :8443).
- path: manager_metrics_patch.yaml
  target:
    kind: Deployment
# [WEBHOOK] Mount the webhook serving cert + open the webhook port on the manager.
- path: manager_webhook_patch.yaml
  target:
    kind: Deployment

# [CERTMANAGER] CA injection for the webhook:
#   - substitute the webhook Service name/namespace into the serving-cert dnsNames
#   - inject the serving-cert CA into the ValidatingWebhookConfiguration's caBundle
replacements:
  - source:
      kind: Service
      version: v1
      name: webhook-service
      fieldPath: .metadata.name
    targets:
      - select:
          kind: Certificate
          group: cert-manager.io
          version: v1
          name: serving-cert
        fieldPaths:
          - .spec.dnsNames.0
          - .spec.dnsNames.1
        options:
          delimiter: '.'
          index: 0
          create: true
  - source:
      kind: Service
      version: v1
      name: webhook-service
      fieldPath: .metadata.namespace
    targets:
      - select:
          kind: Certificate
          group: cert-manager.io
          version: v1
          name: serving-cert
        fieldPaths:
          - .spec.dnsNames.0
          - .spec.dnsNames.1
        options:
          delimiter: '.'
          index: 1
          create: true
  - source:
      kind: Certificate
      group: cert-manager.io
      version: v1
      name: serving-cert
      fieldPath: .metadata.namespace
    targets:
      - select:
          kind: ValidatingWebhookConfiguration
        fieldPaths:
          - .metadata.annotations.[cert-manager.io/inject-ca-from]
        options:
          delimiter: '/'
          index: 0
          create: true
  - source:
      kind: Certificate
      group: cert-manager.io
      version: v1
      name: serving-cert
      fieldPath: .metadata.name
    targets:
      - select:
          kind: ValidatingWebhookConfiguration
        fieldPaths:
          - .metadata.annotations.[cert-manager.io/inject-ca-from]
        options:
          delimiter: '/'
          index: 1
          create: true
