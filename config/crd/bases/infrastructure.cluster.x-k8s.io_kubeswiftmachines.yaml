kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: kubeswiftmachines.infrastructure.cluster.x-k8s.io
spec:
  group: infrastructure.cluster.x-k8s.io
  names:
    categories:
    - cluster-api
    kind: KubeSwiftMachine
    listKind: KubeSwiftMachineList
    plural: kubeswiftmachines
    singular: kubeswiftmachine
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: VM is provisioned and running
      jsonPath: .status.ready
      name: Ready
      type: boolean
    - description: SwiftGuest provider ID
      jsonPath: .spec.providerID
      name: ProviderID
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          KubeSwiftMachine is the Schema for the kubeswiftmachines API. It is the
          infrastructure counterpart of a Cluster API Machine, backed by a SwiftGuest VM.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: KubeSwiftMachineSpec defines the desired state of KubeSwiftMachine.
            properties:
              failureDomain:
                description: |-
                  failureDomain is the failure domain the VM is placed in. The controller
                  copies it from the owning Cluster API Machine's spec.failureDomain.
                type: string
              guestClassRef:
                description: |-
                  guestClassRef names the SwiftGuestClass that supplies the VM's CPU, memory,
                  and disk sizing.
                type: string
              imageRef:
                description: imageRef names the SwiftImage the VM boots from (disk
                  boot).
                type: string
              networkRef:
                description: |-
                  networkRef optionally attaches the VM's primary interface to a named network
                  (a NetworkAttachmentDefinition). Empty uses the default pod network.
                type: string
              providerID:
                description: |-
                  providerID identifies the SwiftGuest VM backing this machine, in the form
                  "kubeswift://<guest-namespace>/<guest-name>". The controller sets it once the
                  VM is provisioned; the Cluster API Machine controller copies it onto the
                  Node. Required by the infrastructure-provider contract.
                type: string
              resources:
                description: resources optionally overrides the CPU and memory from
                  the guest class.
                properties:
                  cpu:
                    description: cpu is the number of vCPUs.
                    format: int32
                    minimum: 1
                    type: integer
                  memoryMiB:
                    description: memoryMiB is the guest memory in MiB.
                    format: int64
                    minimum: 1
                    type: integer
                type: object
            type: object
          status:
            description: KubeSwiftMachineStatus defines the observed state of KubeSwiftMachine.
            properties:
              addresses:
                description: addresses lists the addresses assigned to the VM.
                items:
                  description: MachineAddress is an address surfaced from the backing
                    VM.
                  properties:
                    address:
                      description: address is the machine address value.
                      type: string
                    type:
                      description: |-
                        type is the machine address type: Hostname, InternalIP, ExternalIP,
                        InternalDNS, or ExternalDNS.
                      type: string
                  required:
                  - address
                  - type
                  type: object
                type: array
              conditions:
                description: conditions represents the observations of the KubeSwiftMachine's
                  state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              failureMessage:
                description: failureMessage is a human-readable description of a terminal
                  failure.
                type: string
              failureReason:
                description: |-
                  failureReason is a terminal, programmatic failure cause. When set, the
                  machine is not retried and requires manual intervention.
                type: string
              ready:
                description: |-
                  ready denotes that the VM is provisioned and running. Required by the
                  Cluster API infrastructure-provider contract.
                type: boolean
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
