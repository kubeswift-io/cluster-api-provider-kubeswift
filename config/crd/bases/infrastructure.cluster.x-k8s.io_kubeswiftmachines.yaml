---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: kubeswiftmachines.infrastructure.cluster.x-k8s.io
spec:
  group: infrastructure.cluster.x-k8s.io
  names:
    categories:
    - cluster-api
    kind: KubeSwiftMachine
    listKind: KubeSwiftMachineList
    plural: kubeswiftmachines
    singular: kubeswiftmachine
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: VM is provisioned and running
      jsonPath: .status.initialization.provisioned
      name: Provisioned
      type: boolean
    - description: Machine backend
      jsonPath: .spec.backend.type
      name: Backend
      type: string
    - description: Provider ID
      jsonPath: .spec.providerID
      name: ProviderID
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          KubeSwiftMachine is the Schema for the kubeswiftmachines API. It is the
          infrastructure counterpart of a Cluster API Machine, backed by a KubeSwift VM.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: KubeSwiftMachineSpec defines the desired state of KubeSwiftMachine.
            properties:
              backend:
                description: |-
                  backend selects and configures the KubeSwift resource that backs this machine.
                  The config matching backend.type must be set. Today only "SwiftGuest" is a
                  valid node backend; the discriminator exists so a future feasible substrate
                  can be added without an API break.
                properties:
                  swiftGuest:
                    description: |-
                      swiftGuest configures the SwiftGuest (full VM) backend. Required when
                      type is "SwiftGuest".
                    properties:
                      guestClassRef:
                        description: |-
                          guestClassRef names the cluster-scoped SwiftGuestClass that supplies the VM's
                          CPU, memory, and root-disk sizing (SwiftGuest carries no inline sizing).
                        type: string
                      imageRef:
                        description: |-
                          imageRef names the SwiftImage the VM boots from (disk boot). It references a
                          SwiftImage by name in the guest namespace, which must be Ready before boot.
                        type: string
                      networkRef:
                        description: |-
                          networkRef optionally attaches the VM's primary interface to a named network
                          (a NetworkAttachmentDefinition). Empty uses the default node-local network.
                        type: string
                    type: object
                  type:
                    default: SwiftGuest
                    description: type is the backend kind. Only "SwiftGuest" is currently
                      supported.
                    enum:
                    - SwiftGuest
                    type: string
                required:
                - type
                type: object
              providerID:
                description: |-
                  providerID must match the provider ID on the Node backing this machine, in
                  the form "kubeswift://<guest-namespace>/<guest-name>". The controller sets it
                  once the backing resource is provisioned; the Cluster API Machine controller
                  surfaces it on the Machine. Cluster API infrastructure-provider contract field.
                maxLength: 512
                minLength: 1
                type: string
            required:
            - backend
            type: object
          status:
            description: KubeSwiftMachineStatus defines the observed state of KubeSwiftMachine.
            properties:
              addresses:
                description: addresses lists the addresses assigned to the VM, surfaced
                  to the Machine.
                items:
                  description: MachineAddress contains information for the node's
                    address.
                  properties:
                    address:
                      description: address is the machine address.
                      maxLength: 256
                      minLength: 1
                      type: string
                    type:
                      description: type is the machine address type, one of Hostname,
                        ExternalIP, InternalIP, ExternalDNS or InternalDNS.
                      enum:
                      - Hostname
                      - ExternalIP
                      - InternalIP
                      - ExternalDNS
                      - InternalDNS
                      type: string
                  required:
                  - address
                  - type
                  type: object
                type: array
              conditions:
                description: |-
                  conditions represents the observations of the KubeSwiftMachine's state.
                  A condition of type "Ready" is mirrored into the Machine's InfrastructureReady
                  condition. Per the v1beta2 contract, terminal failures are surfaced via
                  conditions (there is no failureReason/failureMessage).
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              failureDomain:
                description: |-
                  failureDomain is the failure domain the VM was actually placed in, surfaced
                  to the Machine.
                maxLength: 256
                minLength: 1
                type: string
              initialization:
                description: |-
                  initialization reports the KubeSwiftMachine initialization state.
                  Part of the Cluster API infrastructure-provider contract (v1beta2).
                properties:
                  provisioned:
                    description: |-
                      provisioned is true when the infrastructure provider reports that the
                      resource's infrastructure is fully provisioned.
                    type: boolean
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
