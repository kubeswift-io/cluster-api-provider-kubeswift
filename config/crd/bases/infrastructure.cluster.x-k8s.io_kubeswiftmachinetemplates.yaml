              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: KubeSwiftMachineTemplateSpec defines the desired state of
              KubeSwiftMachineTemplate.
            properties:
              template:
                description: |-
                  template is the KubeSwiftMachine that MachineDeployments and ClusterClass
                  stamp out.
                properties:
                  metadata:
                    description: metadata is the labels and annotations to stamp onto
                      the created object.
                    minProperties: 1
                    properties:
                      annotations:
                        additionalProperties:
                          type: string
                        description: |-
                          annotations is an unstructured key value map stored with a resource that may be
                          set by external tools to store and retrieve arbitrary metadata. They are not
                          queryable and should be preserved when modifying objects.
                          More info: http://kubernetes.io/docs/user-guide/annotations
                        type: object
                      labels:
                        additionalProperties:
                          type: string
                        description: |-
                          labels is a map of string keys and values that can be used to organize and categorize
                          (scope and select) objects. May match selectors of replication controllers
                          and services.
                          More info: http://kubernetes.io/docs/user-guide/labels
                        type: object
                    type: object
                  spec:
                    description: spec is the KubeSwiftMachineSpec to stamp out.
                    properties:
                      backend:
                        description: |-
                          backend selects and configures the KubeSwift resource that backs this machine.
                          The config matching backend.type must be set. Today only "SwiftGuest" is a
                          valid node backend; the discriminator exists so a future feasible substrate
                          can be added without an API break.
                        properties:
                          swiftGuest:
                            description: |-
                              swiftGuest configures the SwiftGuest (full VM) backend. Required when
                              type is "SwiftGuest".
                            properties:
                              guestClassRef:
                                description: |-
                                  guestClassRef names the cluster-scoped SwiftGuestClass that supplies the VM's
                                  CPU, memory, and root-disk sizing (SwiftGuest carries no inline sizing).
                                type: string
                              imageRef:
                                description: |-
                                  imageRef names the SwiftImage the VM boots from (disk boot). It references a
                                  SwiftImage by name in the guest namespace, which must be Ready before boot.
                                type: string
                              networkRef:
                                description: |-
                                  networkRef optionally attaches the VM's primary interface to a named network
                                  (a NetworkAttachmentDefinition). Empty uses the default node-local network.
                                type: string
                              nodeNetworkRef:
                                description: |-
                                  nodeNetworkRef optionally attaches a SECONDARY interface to a named routable
                                  network (a NetworkAttachmentDefinition — e.g. an OVN-Kubernetes secondary UDN)
                                  that carries the workload node datapath: apiserver<->kubelet and the pod overlay,
                                  with unique cross-node-routable IPs. The primary interface stays node-local (nat),
                                  so the control-plane endpoint remains reachable from the management cluster (no
                                  proxy). Each node's kubelet --node-ip must be set to this interface's address (a
                                  bootstrap step). Use this for multi-node clusters when the primary pod network is
                                  not itself node-routable. Composes with a Service-backed control-plane endpoint;
                                  unlike networkRef (which makes the named network the guest's *primary*), it does
                                  not isolate the apiserver from the management controllers.
                                type: string
                              storageClassName:
