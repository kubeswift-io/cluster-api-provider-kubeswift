# A ClusterClass backed by KubeSwift, plus a topology Cluster that uses it.
#
# ClusterClass is EXPERIMENTAL: enable the feature gate on the management cluster
# (CLUSTER_TOPOLOGY=true, e.g. `clusterctl init` with the env var). The
# KubeSwiftMachineTemplate immutability webhook (this provider) tolerates the topology
# controller's SSA dry-run so template diffing works.
#
# Prerequisites (same as capi-service-endpoint.yaml): KubeSwift + this provider +
# cert-manager, cluster-scoped SwiftGuestClasses (capi-controlplane, capi-worker), and a
# Ready SwiftImage (ubuntu-noble). This class uses endpoint.mode=Service, so the provider
# provisions the control-plane endpoint (a ClusterIP Service) — no operator VIP needed.
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: KubeSwiftClusterTemplate
metadata:
  name: ks-classy
  namespace: default
spec:
  template:
    spec:
      endpoint:
        mode: Service
        service: { type: ClusterIP, port: 6443 }
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: KubeSwiftMachineTemplate
metadata:
  name: ks-classy-controlplane
  namespace: default
spec:
  template:
    spec:
      backend:
        type: SwiftGuest
        swiftGuest: { imageRef: ubuntu-noble, guestClassRef: capi-controlplane }
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: KubeSwiftMachineTemplate
metadata:
  name: ks-classy-worker
  namespace: default
spec:
  template:
    spec:
      backend:
        type: SwiftGuest
        swiftGuest: { imageRef: ubuntu-noble, guestClassRef: capi-worker }
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta2
kind: KubeadmControlPlaneTemplate
metadata:
  name: ks-classy-controlplane
  namespace: default
spec:
  template:
    spec:
      kubeadmConfigSpec:
        # No cloud-provider: the provider sets each Node's providerID by patching it.
        initConfiguration:
          nodeRegistration: { criSocket: unix:///run/containerd/containerd.sock }
        joinConfiguration:
          nodeRegistration: { criSocket: unix:///run/containerd/containerd.sock }
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
kind: KubeadmConfigTemplate
metadata:
  name: ks-classy-worker
  namespace: default
spec:
  template:
    spec:
      joinConfiguration:
        nodeRegistration: { criSocket: unix:///run/containerd/containerd.sock }
---
apiVersion: cluster.x-k8s.io/v1beta2
kind: ClusterClass
metadata:
  name: ks-classy
  namespace: default
spec:
  infrastructure:
    templateRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
      kind: KubeSwiftClusterTemplate
      name: ks-classy
  controlPlane:
    templateRef:
      apiVersion: controlplane.cluster.x-k8s.io/v1beta2
      kind: KubeadmControlPlaneTemplate
      name: ks-classy-controlplane
    machineInfrastructure:
      templateRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
        kind: KubeSwiftMachineTemplate
        name: ks-classy-controlplane
  workers:
    machineDeployments:
      - class: default-worker
        bootstrap:
          templateRef:
            apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
            kind: KubeadmConfigTemplate
            name: ks-classy-worker
        infrastructure:
          templateRef:
            apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
            kind: KubeSwiftMachineTemplate
            name: ks-classy-worker
---
apiVersion: cluster.x-k8s.io/v1beta2
kind: Cluster
metadata:
  name: ks-classy-01
  namespace: default
spec:
  clusterNetwork:
    # Must NOT overlap the management cluster's pod/service CIDRs or the guest NAT range
    # (192.168.99.0/24) — the workload nodes are VMs on the management cluster's network.
    pods: { cidrBlocks: ["172.20.0.0/16"] }
    services: { cidrBlocks: ["172.21.0.0/16"] }
  topology:
    classRef:
      name: ks-classy
    version: v1.34.0
    controlPlane:
      replicas: 1
    workers:
      machineDeployments:
        - class: default-worker
          name: md-0
          replicas: 2
