# clusterctl cluster template — KubeSwift, mode:Service (no OVN required).
# Use: clusterctl generate cluster NAME --infrastructure kubeswift \
#        --kubernetes-version v1.34.0 --control-plane-machine-count 1 --worker-machine-count 2
# Variables (with defaults): NAMESPACE, POD_CIDR, SERVICE_CIDR, KUBESWIFT_IMAGE,
# KUBESWIFT_CONTROL_PLANE_CLASS, KUBESWIFT_WORKER_CLASS.
# Prereqs: a Ready SwiftImage + cluster-scoped SwiftGuestClasses; install a CNI on the
# workload cluster after the control plane is up.
apiVersion: cluster.x-k8s.io/v1beta2
kind: Cluster
metadata:
  name: ${CLUSTER_NAME}
  namespace: ${NAMESPACE}
spec:
  clusterNetwork:
    # Must not overlap the management cluster's pod/service CIDRs or the guest NAT range.
    pods: { cidrBlocks: ["${POD_CIDR:=172.20.0.0/16}"] }
    services: { cidrBlocks: ["${SERVICE_CIDR:=172.21.0.0/16}"] }
  controlPlaneRef:
    apiGroup: controlplane.cluster.x-k8s.io
    kind: KubeadmControlPlane
    name: ${CLUSTER_NAME}-control-plane
  infrastructureRef:
    apiGroup: infrastructure.cluster.x-k8s.io
    kind: KubeSwiftCluster
    name: ${CLUSTER_NAME}
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: KubeSwiftCluster
metadata:
  name: ${CLUSTER_NAME}
  namespace: ${NAMESPACE}
spec:
  endpoint:
    mode: Service
    service: { type: ClusterIP, port: 6443 }
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta2
kind: KubeadmControlPlane
metadata:
  name: ${CLUSTER_NAME}-control-plane
  namespace: ${NAMESPACE}
spec:
  replicas: ${CONTROL_PLANE_MACHINE_COUNT}
  version: ${KUBERNETES_VERSION}
  machineTemplate:
    spec:
      infrastructureRef:
        apiGroup: infrastructure.cluster.x-k8s.io
        kind: KubeSwiftMachineTemplate
        name: ${CLUSTER_NAME}-control-plane
  kubeadmConfigSpec:
    # No cloud-provider: the provider sets each Node's providerID by patching it.
    initConfiguration:
      nodeRegistration: { criSocket: unix:///run/containerd/containerd.sock }
    joinConfiguration:
      nodeRegistration: { criSocket: unix:///run/containerd/containerd.sock }
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: KubeSwiftMachineTemplate
metadata:
  name: ${CLUSTER_NAME}-control-plane
  namespace: ${NAMESPACE}
spec:
  template:
    spec:
      backend:
        type: SwiftGuest
        swiftGuest:
          imageRef: ${KUBESWIFT_IMAGE:=ubuntu-noble}
          guestClassRef: ${KUBESWIFT_CONTROL_PLANE_CLASS:=capi-controlplane}
---
apiVersion: cluster.x-k8s.io/v1beta2
kind: MachineDeployment
metadata:
  name: ${CLUSTER_NAME}-md-0
  namespace: ${NAMESPACE}
spec:
  clusterName: ${CLUSTER_NAME}
  replicas: ${WORKER_MACHINE_COUNT}
  selector:
    matchLabels: {}
  template:
    spec:
      clusterName: ${CLUSTER_NAME}
      version: ${KUBERNETES_VERSION}
      bootstrap:
        configRef:
          apiGroup: bootstrap.cluster.x-k8s.io
          kind: KubeadmConfigTemplate
          name: ${CLUSTER_NAME}-md-0
      infrastructureRef:
        apiGroup: infrastructure.cluster.x-k8s.io
        kind: KubeSwiftMachineTemplate
        name: ${CLUSTER_NAME}-md-0
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: KubeSwiftMachineTemplate
metadata:
  name: ${CLUSTER_NAME}-md-0
  namespace: ${NAMESPACE}
spec:
  template:
    spec:
      backend:
        type: SwiftGuest
        swiftGuest:
          imageRef: ${KUBESWIFT_IMAGE:=ubuntu-noble}
          guestClassRef: ${KUBESWIFT_WORKER_CLASS:=capi-worker}
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
kind: KubeadmConfigTemplate
metadata:
  name: ${CLUSTER_NAME}-md-0
  namespace: ${NAMESPACE}
spec:
  template:
    spec:
      joinConfiguration:
        nodeRegistration: { criSocket: unix:///run/containerd/containerd.sock }
