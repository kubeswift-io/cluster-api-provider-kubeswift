name: Release

# On a vX.Y.Z tag: build+push the manager image, then publish a draft GitHub release
# carrying the assets clusterctl consumes — metadata.yaml,
# infrastructure-components.yaml, and the cluster templates (the default flavor
# plus cluster-template-multi-node.yaml, fetched by `--flavor multi-node`).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create the GitHub release
  packages: write   # push the manager image to GHCR

jobs:
  release:
    name: Build image + publish clusterctl assets
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push the manager image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ github.repository }}:${{ github.ref_name }}

      - name: Generate clusterctl release assets
        run: |
          make build-installer IMG=ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          cp dist/install.yaml infrastructure-components.yaml

      # Draft so a human reviews before publishing; clusterctl reads these assets by name.
      - name: Publish draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            metadata.yaml
            infrastructure-components.yaml
            templates/cluster-template.yaml
            templates/cluster-template-multi-node.yaml
